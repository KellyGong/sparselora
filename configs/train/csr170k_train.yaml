dataset: "datasets/commonsense_170k.json"
eval_dataset: "boolq+piqa+social-iqa+hellaswag+winogrande+arc-easy+arc-challenge+openbookqa"
per_device_train_batch_size: 8
num_train_epochs: 1
learning_rate: 3e-4
lr_scheduler_type: cosine
warmup_ratio: 0.04
eval_strategy: "no"
save_strategy: "no"
logging_steps: 1
logging_strategy: "steps"
peft: "reft"
bf16: true
lora_dropout: 0.0
ddp_find_unused_parameters: false
max_grad_norm: 2.0
model_max_length: 1024
max_seq_length: 1024
gradient_accumulation_steps: 2